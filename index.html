<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium, professional glassmorphic stopwatch web application with precise timing, Web Audio feedback, accent color themes, and session persistence.">
    <meta name="keywords" content="stopwatch, professional timer, web utility, glassmorphism, online stopwatch, lap timer, audio stopwatch">
    <title>AetherStop Pro - Precision Glassmorphic Stopwatch</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-cyan">
    <!-- Background Decorative Elements -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <main class="app-container">
        <!-- Main Stopwatch Panel -->
        <section class="stopwatch-card">
            <header class="app-header">
                <div class="header-top">
                    <!-- Accent Color Theme Switcher -->
                    <div class="theme-selector" role="radiogroup" aria-label="Select accent theme">
                        <button class="theme-dot dot-cyan active" data-theme="cyan" title="Cyberpunk Cyan" aria-checked="true"></button>
                        <button class="theme-dot dot-gold" data-theme="gold" title="Solar Gold" aria-checked="false"></button>
                        <button class="theme-dot dot-purple" data-theme="purple" title="Nebula Purple" aria-checked="false"></button>
                        <button class="theme-dot dot-mint" data-theme="mint" title="Emerald Mint" aria-checked="false"></button>
                    </div>
                </div>

                <div class="app-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <h1>Aether<span>Stop</span></h1>
                    <span class="pro-badge">PRO</span>
                </div>
                <p class="app-subtitle">Precision Time Tracking</p>
            </header>

            <!-- Visual Ring & Time Display -->
            <div class="timer-outer-ring">
                <!-- Circular SVG Progress Bar -->
                <svg class="progress-svg" width="250" height="250" viewBox="0 0 250 250">
                    <circle class="progress-bg-circle" cx="125" cy="125" r="118" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="5" />
                    <circle class="progress-fg-circle" id="progress-ring" cx="125" cy="125" r="118" fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" transform="rotate(-90 125 125)" />
                </svg>

                <div class="timer-inner-ring">
                    <div class="time-display" id="time-display">
                        <span class="time-main" id="time-main">00:00:00</span>
                        <span class="time-ms" id="time-ms">.00</span>
                    </div>
                </div>
            </div>

            <!-- Controls Section -->
            <div class="controls-container">
                <!-- Reset / Lap Button -->
                <button id="btn-left" class="btn btn-secondary" disabled aria-label="Lap or Reset">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-left">
                            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>
                        </svg>
                    </span>
                    <span id="btn-left-text">Lap</span>
                </button>

                <!-- Play / Pause Button -->
                <button id="btn-right" class="btn btn-primary" aria-label="Start or Pause">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-right">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                    </span>
                    <span id="btn-right-text">Start</span>
                </button>
            </div>
        </section>

        <!-- Laps History Panel -->
        <section class="laps-card">
            <div class="laps-header">
                <h2>Lap History</h2>
                <div class="laps-header-actions">
                    <button id="btn-export-csv" class="btn-action-text" title="Download CSV" style="display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="action-icon">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>CSV</span>
                    </button>
                    <button id="btn-export-copy" class="btn-action-text" title="Copy to clipboard" style="display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="action-icon">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        <span>Copy</span>
                    </button>
                    <span class="lap-count-badge" id="lap-count">0 Laps</span>
                </div>
            </div>
            
            <div class="laps-body" id="laps-container">
                <!-- Empty State -->
                <div class="empty-state" id="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    <p>No laps recorded yet.<br>Press Lap while running to track intervals.</p>
                </div>

                <!-- Laps Table -->
                <div class="table-wrapper" id="table-wrapper" style="display: none;">
                    <table class="laps-table">
                        <thead>
                            <tr>
                                <th>Lap</th>
                                <th>Split Time</th>
                                <th>Total Time</th>
                            </tr>
                        </thead>
                        <tbody id="laps-list">
                            <!-- Dynamic rows loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <p>&copy; 2026 AetherStop Pro. Precision Engineering.</p>
    </footer>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
